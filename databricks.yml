bundle:
  name: model-genie

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  apps:
    model-genie-app:
      name: "model-genie"
      description: "Model Genie - business questions in, semantic models out"
      source_code_path: ./.build
      user_api_scopes:
        - sql.statement-execution
        - sql.warehouses:read
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - serving.serving-endpoints
      permissions:
        - user_name: jonathan.whiteley@databricks.com
          level: CAN_MANAGE

targets:
  dev:
    mode: development
    default: true
